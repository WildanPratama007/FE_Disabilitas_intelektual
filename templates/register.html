<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <title>Register - Platform Deteksi Disabilitas Intelektual</title>
  
  <!-- Bootstrap core CSS -->
  <link href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
  <!-- Additional CSS Files -->
  <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/fontawesome.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/templatem.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/custom.css') }}">
</head>

<body>
  <!-- ***** Header Area Start ***** -->
  <header class="header-area header-sticky">
    <div class="container">
      <div class="row">
        <div class="col-12">
          <nav class="main-nav">
            <a href="/" class="logo">
              <img src="{{ url_for('static', filename='assets/images/yarsiai.png') }}" alt="">
            </a>
            <ul class="nav">
              <li><a href="/">Home</a></li>
              <li><a href="index.html#about-us">About us</a></li>
              <li><a href="index.html#contact-us">Contact Us</a></li>
              <li><a href="/login">Login</a></li>
              <!-- <li><a href="/register" class="active">Register</a></li> -->
            </ul>
          </nav>
        </div>
      </div>
    </div>
  </header>

  <!-- ***** Register Section Start ***** -->
  <section style="min-height: 90vh; display: flex; align-items: center; padding: 20px 0 50px 0;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div style="background: rgba(255,255,255,0.95); border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0, 102, 204, 0.3); border: 2px solid rgba(0, 102, 204, 0.2);">
            
            <!-- Medical Header -->
            <div style="text-align: center; margin-bottom: 30px;">
              <div style="background: rgba(46, 204, 113, 0.1); border: 2px solid #0066CC; border-radius: 50px; padding: 8px 20px; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                <i class="fa fa-user-plus" style="color: #0066CC;"></i>
                <span style="color: #0066CC; font-size: 12px; font-weight: 600;">REGISTRATION</span>
                <i class="fa fa-stethoscope" style="color: #0066CC;"></i>
              </div>
              <!-- <h2 style="color: #0066CC; margin: 0; font-size: 28px;">🏥 Registrasi Medis</h2> -->
              <!-- <h2 style="color: #0066CC; margin: 0; font-size: 28px;">📝 Registrasi</h2> -->
              <p style="color: #666; font-size: 14px; margin: 10px 0 0 0;">Daftar sebagai pengguna baru</p>
            </div>

            <!-- Register Form -->
            <form method="POST" action="/register">
              <div class="row">
                <div class="col-md-6">
                  <div style="margin-bottom: 20px;">
                    <label style="color: #0066CC; font-weight: 600; margin-bottom: 8px; display: block;">
                      <i class="fa fa-user" style="margin-right: 8px;"></i>Nama Lengkap
                    </label>
                    <input type="text" name="fullname" required 
                           style="width: 100%; padding: 12px 15px; border: 2px solid #E8F5E8; border-radius: 10px; font-size: 14px; transition: all 0.3s ease;"
                           placeholder="Nama Lengkap"
                           onfocus="this.style.borderColor='#0066CC'; this.style.boxShadow='0 0 10px rgba(46,204,113,0.2)'"
                           onblur="this.style.borderColor='#E8F5E8'; this.style.boxShadow='none'">
                  </div>
                </div>
                <div class="col-md-6">
                  <div style="margin-bottom: 20px;">
                    <label style="color: #0066CC; font-weight: 600; margin-bottom: 8px; display: block;">
                      <i class="fa fa-envelope" style="margin-right: 8px;"></i>Email
                    </label>
                    <input type="email" name="email" required 
                           style="width: 100%; padding: 12px 15px; border: 2px solid #E8F5E8; border-radius: 10px; font-size: 14px; transition: all 0.3s ease;"
                           placeholder="email@example.com"
                           onfocus="this.style.borderColor='#0066CC'; this.style.boxShadow='0 0 10px rgba(46,204,113,0.2)'"
                           onblur="this.style.borderColor='#E8F5E8'; this.style.boxShadow='none'">
                  </div>
                </div>
              </div>



              <div class="row">
                <div class="col-md-6">
                  <div style="margin-bottom: 20px;">
                    <label style="color: #0066CC; font-weight: 600; margin-bottom: 8px; display: block;">
                      <i class="fa fa-lock" style="margin-right: 8px;"></i>Password
                    </label>
                    <input type="password" name="password" required 
                           style="width: 100%; padding: 12px 15px; border: 2px solid #E8F5E8; border-radius: 10px; font-size: 14px; transition: all 0.3s ease;"
                           placeholder="Minimal 8 karakter"
                           onfocus="this.style.borderColor='#0066CC'; this.style.boxShadow='0 0 10px rgba(46,204,113,0.2)'"
                           onblur="this.style.borderColor='#E8F5E8'; this.style.boxShadow='none'">
                  </div>
                </div>
                <div class="col-md-6">
                  <div style="margin-bottom: 25px;">
                    <label style="color: #0066CC; font-weight: 600; margin-bottom: 8px; display: block;">
                      <i class="fa fa-lock" style="margin-right: 8px;"></i>Konfirmasi Password
                    </label>
                    <input type="password" name="confirm_password" required 
                           style="width: 100%; padding: 12px 15px; border: 2px solid #E8F5E8; border-radius: 10px; font-size: 14px; transition: all 0.3s ease;"
                           placeholder="Ulangi password"
                           onfocus="this.style.borderColor='#0066CC'; this.style.boxShadow='0 0 10px rgba(46,204,113,0.2)'"
                           onblur="this.style.borderColor='#E8F5E8'; this.style.boxShadow='none'">
                  </div>
                </div>
              </div>

              <div style="margin-bottom: 25px;">
                <label style="display: flex; align-items: flex-start; color: #666; font-size: 14px;">
                  <input type="checkbox" name="terms" required style="margin-right: 10px; margin-top: 3px;">
                  Saya menyetujui <a href="#" style="color: #0066CC; text-decoration: none;">syarat dan ketentuan</a> 
                  serta <a href="#" style="color: #0066CC; text-decoration: none;">kebijakan privasi</a> platform medis ini
                </label>
              </div>

              <button type="submit" 
                      style="width: 100%;  background: linear-gradient(135deg, #0066CC 0%, #17A2B8 100%); color: white; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);"
                      onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(46, 204, 113, 0.4)'"
                      onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(46, 204, 113, 0.3)'">
                🩺 Daftar
              </button>
            </form>

            <!-- Medical Disclaimer
            <div style="background: rgba(52, 152, 219, 0.1); border-left: 4px solid #3498DB; padding: 12px 15px; margin-top: 25px; border-radius: 8px;">
              <p style="color: #2980B9; font-size: 12px; margin: 0;">
                ℹ️ <strong>Verifikasi Diperlukan:</strong> Akun akan diverifikasi oleh administrator sebelum dapat mengakses sistem medis.
              </p>
            </div> -->

            <!-- Additional Links -->
            <div style="text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #E8F5E8;">
              <p style="color: #666; font-size: 14px; margin: 0;">
                Sudah memiliki akun? 
                <a href="/login" style="color: #0066CC; text-decoration: none; font-weight: 600;">Login di sini</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

    <!-- Footer -->
  <footer style="background-color: #0066CC; text-align: center; padding: 20px 0;">
    <div class="container">
      <p style="color: #fff; margin: 0; font-size: 14px;">
        Copyright © 2025. YARSI AI Medical Platform. All rights reserved.
      </p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="{{ url_for('static', filename='vendor/jquery/jquery.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.min.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/js/custom.js') }}"></script>
</body>

</html>
